name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  library:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/osheet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/osheet-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "../osheet" && pip install -e ".[dev]"
      - run: pytest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/osheet-app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/osheet-app/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
