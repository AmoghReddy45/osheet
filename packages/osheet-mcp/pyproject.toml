[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "osheet-mcp"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.3",
    "osheet @ file:///Users/amoghreddy/excel-project/packages/osheet",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
osheet-mcp = "osheet_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/osheet_mcp"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
