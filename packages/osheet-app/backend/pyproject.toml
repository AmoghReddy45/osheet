[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "osheet-app"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "python-multipart>=0.0.9",
    "osheet @ file:///Users/amoghreddy/excel-project/packages/osheet",
]

[project.optional-dependencies]
dev = ["pytest>=8", "httpx>=0.27", "anyio[trio]"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
